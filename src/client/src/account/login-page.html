<template>
    <div class="container">
        <br />
        <div class="mt-5 bg-body-secondary position-relative p-5 text-muted bg-body border border-dashed rounded-5">
            <form class="form-horizontal" submit.trigger="login()">
                <div class="form-floating mb-3">
                    <input id="email" class="form-control" aria-required="true" autocomplete="on" type="email" placeholder="name@example.com" value.bind="loginViewModel.email" ref="emailInput">
                    <label for="email">Email address</label>
                </div>
                <div class="form-floating mb-3">
                    <input id="password" class="form-control" aria-required="true" type="password" placeholder="password" value.bind="loginViewModel.password" ref="passwordInput">
                    <label for="password">Password</label>
                </div>
                <div class="checkbox mb-3">
                    <label for="remember-me">
                        <input type="checkbox" id="remember-me" checked.bind="loginViewModel.rememberMe">
                        &nbsp;Remember me?
                    </label>
                </div>
                <div class="mb-3">
                    <turnstile turnstile-verified.trigger="onTurnstileSuccess($event)"></turnstile>
                </div>
                <div class="mb-3" if.bind="errors.length > 0">
                    <div class="alert alert-danger mb-0">
                        <div repeat.for="error of errors">${error}</div>
                    </div>
                </div>
                <div class="mb-2">
                    <button type="submit" class="w-50 btn btn-lg btn-primary">Log in</button>
                </div>
                <div class="mb-2">
                    <a load="/request-password-reset">Forgot your password?</a>
                </div>
                <div class="mb-1">
                    <a load="/register">Register as a new user?</a>
                </div>
            </form>
        </div>
    </div>
</template>
